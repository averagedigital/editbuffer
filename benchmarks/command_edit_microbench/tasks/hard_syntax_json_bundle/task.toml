schema_version = "1.3"
artifacts = []

[task]
name = "local/hard-syntax-json-bundle"
description = "Repair one grouping syntax error in a long shell command with exact JSONL payload."
keywords = ["command-repair", "syntax", "shell", "subshell", "jsonl"]
[[task.authors]]
name = "averagedigital"

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
network_mode = "public"
os = "linux"

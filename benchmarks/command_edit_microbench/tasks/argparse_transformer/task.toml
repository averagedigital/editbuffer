schema_version = "1.3"
artifacts = []

[task]
name = "local/argparse-transformer"
description = "Create a Python CLI with enough code to make heredoc editing useful."
keywords = ["command-editing", "argparse", "python"]
[[task.authors]]
name = "averagedigital"

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
network_mode = "public"
os = "linux"
